<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TaskMaster</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-brand">TaskMaster</h1>
      <div class="nav-right">
        <span id="userDisplay" class="user-display"></span>
        <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pendingTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>High Priority</h3>
        <p id="highPriorityTasks">0</p>
      </div>
    </div>

    <div class="task-controls">
      <button id="showAddTaskBtn" class="btn btn-primary">+ Add New Task</button>
      <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search tasks...">
        <select id="filterPriority">
          <option value="">All Priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="filterStatus">
          <option value="">All Status</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
    </div>

    <div id="taskList" class="task-list"></div>
  </div>

  <!-- Add/Edit Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle">Add New Task</h2>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" placeholder="Enter task title" required>
        </div>
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" placeholder="Enter task description" required></textarea>
        </div>
        <div class="form-group">
          <label for="taskDeadline">Deadline</label>
          <input type="date" id="taskDeadline" required>
        </div>
        <div class="form-group">
          <label for="taskPriority">Priority</label>
          <select id="taskPriority">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taskStatus">Status</label>
          <select id="taskStatus">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Save Task</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
